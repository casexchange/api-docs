paths:
  /case-types:
    get:
      operationId: listCaseTypes
      summary: List case types
      description: Returns all active case types available for creating referrals.
      tags:
        - Reference Data
      security: &ref_3
        - apiKeyAuth: []
      x-access-tier: read_only
      responses:
        "200":
          description: List of case types
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CaseType"
                  meta: *ref_0
                required:
                  - data
                  - meta
        "401": &ref_4
          description: Invalid or missing API key
          content: &ref_2
            application/json:
              schema: *ref_1
        "403": &ref_5
          description: API key tier does not permit this action
          content: *ref_2
  /jurisdictions:
