openapi: 3.0.3
info:
  title: CaseXchange Public API
  version: 1.0.0
  description: |-
    The CaseXchange Public API enables law firms to integrate referral management
    directly into their own systems.

    ## Authentication
    All requests must include an `X-API-Key` header containing a valid API key
    (format: `cxp_<hex>`). Keys are scoped to a firm and an access tier.

    ## Access Tiers
    | Tier | Description |
    |------|-------------|
    | `read_only` | GET endpoints — read data without mutation |
    | `standard` | read_only + create/update case referrals |
    | `full` | standard + delete, close, routing rules, bulk import, firm mutation |

    ## Rate Limiting
    Rate limits are enforced per API key. Exceeded limits return `429 Too Many Requests`.

    ## Pagination
    List endpoints accept `page` (default 1) and `limit` (default 20, max 100) query params.

    ## Response Format
    Successful responses are wrapped in `{ data: T, meta: { requestId, timestamp } }`.
    Errors are wrapped in `{ error: { code, message }, meta: { requestId, timestamp } }`.
  contact:
    name: CaseXchange API Support
    url: https://casexchange.com
servers:
  - url: /api/public/v1
    description: Public API base path
tags:
  - name: Reference Data
    description: Case types, jurisdictions, and counties
  - name: Firms
    description: Firm directory and profile management
  - name: Sent Cases
    description: Cases created and sent by your firm (sender perspective)
  - name: Received Referrals
    description: Referrals received by your firm (receiver perspective) — flexible ID resolution (UUID, reference number, CMS ID)
  - name: Documents
    description: Document upload, download, and management
  - name: Users
    description: User management within the caller's firm
  - name: Routing
    description: Referral routing rules
  - name: Analytics
    description: Dashboard and case analytics
  - name: Notifications
    description: Notification preferences and email management
  - name: Medical Referrals
    description: Medical provider referrals linked to cases
  - name: Import
    description: Bulk case import/update via CSV
  - name: Referrals
    description: Referral sub-resources linked to a BaseCase — lifecycle actions and sub-resource management
  - name: Status Updates
    description: Query status updates and messages across cases and referrals
  - name: Messages
    description: Send messages to partner firms on referrals
  - name: Network
    description: Manage the firm's private referral network relationships
